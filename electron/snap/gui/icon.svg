<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="river" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="50%" stop-color="#29b6f6"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="40" fill="url(#bg)"/>

  <!-- River — filled shape, narrow at top, wide at bottom for perspective -->
  <path d="M118 20 C96 50, 140 70, 119 100 C98 130, 144 150, 121 180 C98 210, 138 225, 108 244
           L148 244 C163 225, 138 210, 151 180 C164 150, 128 130, 145 100 C158 70, 118 50, 138 20 Z"
        fill="url(#river)" opacity="0.9"/>

  <!-- River highlight -->
  <path d="M128 20
           C106 50, 148 70, 132 100
           C116 130, 154 150, 136 180
           C120 210, 152 225, 128 244"
        stroke="#b3e5fc" stroke-width="3" fill="none"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>

  <!-- Left bushes — two columns along left bank -->
  <!-- Row 1: y=35 (red) -->
  <circle cx="88" cy="35" r="7" fill="#e53935" opacity="0.85"/>
  <circle cx="72" cy="35" r="6" fill="#ef5350" opacity="0.8"/>
  <circle cx="56" cy="35" r="5" fill="#c62828" opacity="0.75"/>

