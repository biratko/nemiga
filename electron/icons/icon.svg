  <!-- Background -->
  <rect width="256" height="256" rx="40" fill="url(#bg)"/>

  <!-- River — filled shape, narrow at top, wide at bottom for perspective -->
  <path d="M124 20 C106 50, 142 70, 125 100 C108 130, 146 150, 129 180 C112 210, 143 225, 118 244
           L138 244 C153 225, 128 210, 141 180 C154 150, 122 130, 135 100 C148 70, 114 50, 132 20 Z"
        fill="url(#river)" opacity="0.9"/>

